name: Build & gate dashboard

# Rebuilds Relative_PE_Dashboard.html from source and runs the CLAUDE.md §4
# validation gate on every push/PR to main. Publishing is handled by GitHub
# Pages "Deploy from a branch" (Settings -> Pages -> Source: Deploy from a
# branch -> main / root), which serves the committed, gate-passed files.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build (5-token substitution)
        run: python build.py

      - name: Gate (a) — JS syntax (node --check)
        run: |
          set -euo pipefail
          python3 -c "import re;h=open('Relative_PE_Dashboard.html',encoding='utf-8').read();open('app.js','w',encoding='utf-8').write(max(re.findall(r'<script>([\s\S]*?)</script>',h),key=len))"
          node --check app.js
          rm -f app.js

      - name: Gate (b) — backtest 39/39
        run: |
          set -euo pipefail
          node bt_verify.js | tee gate.out
          grep -q "ALL CHECKS PASSED (39 passed)" gate.out

      - name: Confirm committed HTML matches a fresh build
        run: |
          set -euo pipefail
          git diff --quiet -- Relative_PE_Dashboard.html \
            || echo "::warning::Committed Relative_PE_Dashboard.html differs from a fresh build.py output"

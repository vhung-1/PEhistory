name: Build, gate & deploy dashboard

# On push/PR to main: rebuild Relative_PE_Dashboard.html and run the CLAUDE.md
# §4 gate (node --check + bt_verify.js 39/39). On push to main only, deploy the
# gate-passed site to GitHub Pages (Settings -> Pages -> Source: GitHub Actions).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build (5-token substitution)
        run: python build.py

      - name: Gate (a) — JS syntax (node --check)
        run: |
          set -euo pipefail
          python3 -c "import re;h=open('Relative_PE_Dashboard.html',encoding='utf-8').read();open('app.js','w',encoding='utf-8').write(max(re.findall(r'<script>([\s\S]*?)</script>',h),key=len))"
          node --check app.js
          rm -f app.js

      - name: Gate (b) — backtest 39/39
        run: |
          set -euo pipefail
          node bt_verify.js | tee gate.out
          grep -q "ALL CHECKS PASSED (39 passed)" gate.out

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html Relative_PE_Dashboard.html _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push'   # build+gate run on PRs; deploy only on push to main
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
